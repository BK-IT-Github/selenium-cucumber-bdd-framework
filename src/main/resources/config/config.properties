# ============================================================
# BK Automation Framework - Configuration Properties
# ============================================================

# ---- Application Under Test ----
app.url=https://your-healthcare-app.com
app.name=Healthcare Facility Management

# ---- Browser Settings ----
browser=chrome
browser.headless=false
browser.maximize=true
browser.incognito=false

# ---- Timeout Settings (in seconds) ----
timeout.implicit=10
timeout.explicit=20
timeout.pageload=30
timeout.script=30
timeout.fluent=15
timeout.polling=500

# ---- Environment ----
environment=qa

# ---- Test Data ----
testdata.excel.path=src/test/resources/testdata/excel/TestData.xlsx
testdata.json.path=src/test/resources/testdata/json/

# ---- Screenshot Settings ----
screenshot.on.failure=true
screenshot.on.pass=false
screenshot.path=target/screenshots/

# ---- Reporting ----
report.path=target/reports/
report.title=BK Automation Test Report
report.name=Healthcare Facility Management - Test Execution Report

# ---- Retry Settings ----
retry.count=1
retry.failed.scenarios=true

# ---- Logging ----
log.level=INFO

# ---- Credentials (Override via environment variables in CI/CD) ----
test.username=admin@healthcare.com
test.password=SecurePassword123
