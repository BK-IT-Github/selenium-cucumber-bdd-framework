extent.reporter=spark
extent.reporter.spark.start=true
extent.reporter.spark.out=target/reports/extent/SparkReport.html

# Report Configuration
extent.reporter.spark.config=src/test/resources/extent-config.xml

# System Info
systeminfo.Application=Healthcare Facility Management
systeminfo.Framework=Selenium + Cucumber BDD
systeminfo.Language=Java 17
systeminfo.BuildTool=Maven

# Screenshot Settings
screenshot.dir=target/screenshots/
screenshot.rel.path=../screenshots/

# Base64 Screenshot for Spark Report
extent.reporter.spark.base64imgsrc=true
